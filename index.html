<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a1a">
<title>月交通費請求書</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;600&display=swap');

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #d0cec8;
    --border-strong: #9e9a93;
    --text: #1a1a1a;
    --text-muted: #6b6760;
    --accent: #1a1a1a;
    --accent-fg: #f5f4f0;
    --danger: #c0392b;
    --warning-bg: #fef9e7;
    --warning-border: #f0c040;
    --row-hover: #f0ede8;
    --input-bg: #faf9f7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── HEADER ── */
  header {
    background: var(--accent);
    color: var(--accent-fg);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  header .subtitle {
    font-size: 11px;
    opacity: 0.6;
    margin-top: 2px;
    letter-spacing: 0.08em;
  }

  /* ── MONTH SELECTOR ── */
  .month-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .month-nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .month-nav button {
    width: 32px; height: 32px;
    border: 1px solid var(--border);
    background: var(--bg);
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text);
    transition: background 0.15s;
  }
  .month-nav button:hover { background: var(--border); }
  .month-display {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px;
    font-weight: 600;
    min-width: 120px;
    text-align: center;
    letter-spacing: 0.04em;
  }
  .total-badge {
    margin-left: auto;
    background: var(--accent);
    color: var(--accent-fg);
    padding: 6px 14px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.03em;
  }

  /* ── MAIN CONTENT ── */
  main {
    padding: 16px 20px;
    max-width: 900px;
    margin: 0 auto;
  }

  /* ── TABLE ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead th {
    background: var(--bg);
    border-bottom: 1px solid var(--border-strong);
    padding: 10px 12px;
    text-align: left;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    white-space: nowrap;
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--row-hover); }
  tbody td {
    padding: 10px 12px;
    font-size: 13px;
  }
  td.date { white-space: nowrap; font-variant-numeric: tabular-nums; color: var(--text-muted); }
  td.amount { text-align: right; font-variant-numeric: tabular-nums; }
  td.amount.total { font-weight: 700; }
  td.actions {
    text-align: right;
    white-space: nowrap;
  }
  .empty-row td {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-size: 13px;
    letter-spacing: 0.05em;
  }

  /* ── BUTTONS ── */
  .btn {
    padding: 7px 14px;
    border-radius: 4px;
    border: 1px solid transparent;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.03em;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .btn-primary {
    background: var(--accent);
    color: var(--accent-fg);
    border-color: var(--accent);
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-outline {
    background: transparent;
    color: var(--text);
    border-color: var(--border-strong);
  }
  .btn-outline:hover { background: var(--bg); }
  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border-color: transparent;
    padding: 5px 8px;
    font-size: 13px;
  }
  .btn-ghost:hover { color: var(--text); background: var(--bg); }
  .btn-danger-ghost {
    background: transparent;
    color: var(--danger);
    border-color: transparent;
    padding: 5px 8px;
    font-size: 13px;
  }
  .btn-danger-ghost:hover { background: #fdecea; }
  .action-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  /* ── MODAL ── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 8px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
  }
  .modal-header {
    background: var(--accent);
    color: var(--accent-fg);
    padding: 16px 20px;
    font-family: 'Noto Serif JP', serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .modal-body { padding: 20px; }
  .modal-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    background: var(--bg);
  }

  /* ── FORM ── */
  .form-row {
    margin-bottom: 14px;
  }
  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 5px;
  }
  input[type=text], input[type=date], input[type=number] {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--input-bg);
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  input:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--surface);
  }
  .form-row-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }
  .derived-field {
    padding: 9px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 14px;
    font-variant-numeric: tabular-nums;
    color: var(--text-muted);
  }

  /* ── WARNING ── */
  .warning-box {
    background: var(--warning-bg);
    border: 1px solid var(--warning-border);
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 12px;
    line-height: 1.6;
    margin-bottom: 14px;
    display: none;
  }
  .warning-box.show { display: block; }
  .warning-icon { font-size: 14px; margin-right: 4px; }

  /* ── COPY MODAL ── */
  .copy-month-select {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 8px 0 4px;
  }
  .copy-month-select input[type=month] {
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: inherit;
    font-size: 14px;
    background: var(--input-bg);
    color: var(--text);
  }
  .copy-month-select input[type=month]:focus {
    outline: none;
    border-color: var(--accent);
  }

  /* ── RESPONSIVE ── */
  td.route {
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  @media (max-width: 600px) {
    main { padding: 12px; }
    .month-bar { padding: 10px 12px; }
    header { padding: 12px 16px; }
    td.route { max-width: 120px; }
    .form-row-2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>月交通費請求書</h1>
    <div class="subtitle">電車・バス 他</div>
  </div>
</header>

<div class="month-bar">
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <div class="month-display" id="monthDisplay"></div>
    <button onclick="changeMonth(1)">›</button>
  </div>
  <div class="total-badge" id="totalBadge">合計 ¥0</div>
</div>

<main>
  <div class="action-bar">
    <button class="btn btn-primary" onclick="openAdd()">＋ 追加</button>
    <button class="btn btn-outline" onclick="openCopyFromHistory()">履歴からコピー</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>勤務日</th>
          <th>業者 / 現場名</th>
          <th>経路</th>
          <th style="text-align:right">片道</th>
          <th style="text-align:right">往復</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</main>

<!-- 追加/編集モーダル -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <div class="modal-header" id="editModalTitle">新規追加</div>
    <div class="modal-body">
      <div class="form-row">
        <label>勤務日</label>
        <input type="date" id="f_date">
      </div>
      <div class="form-row">
        <label>業者 / 現場名</label>
        <input type="text" id="f_vendor" placeholder="例：○○警備 △△ビル">
      </div>
      <div class="form-row">
        <label>経路</label>
        <input type="text" id="f_route" placeholder="例：丸ノ内線○○駅〜東西線○○駅（経由：○○駅）">
      </div>
      <div class="form-row-2">
        <div>
          <label>片道運賃（円）</label>
          <input type="number" id="f_oneway" min="0" step="1" placeholder="0" oninput="updateRoundTrip()">
        </div>
        <div>
          <label>往復運賃（自動）</label>
          <div class="derived-field" id="f_roundtrip">0 円</div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeEdit()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- 履歴コピーモーダル -->
<div class="overlay" id="copyOverlay">
  <div class="modal">
    <div class="modal-header">履歴からコピー</div>
    <div class="modal-body">
      <div class="form-row">
        <label>コピー元の月</label>
        <input type="month" id="copySourceMonth" onchange="loadCopySource()">
      </div>
      <div id="copyWarning" class="warning-box">
        <span class="warning-icon">⚠️</span>
        月が異なります。運賃の改正などがないかご注意ください！
      </div>
      <div id="copyList" style="max-height:280px;overflow-y:auto;border:1px solid var(--border);border-radius:4px;"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeCopy()">閉じる</button>
      <button class="btn btn-primary" id="copyConfirmBtn" onclick="confirmCopy()" disabled>選択してコピー</button>
    </div>
  </div>
</div>

<!-- 削除確認 -->
<div class="overlay" id="deleteOverlay">
  <div class="modal">
    <div class="modal-header" style="background:#c0392b">削除の確認</div>
    <div class="modal-body">
      <p style="font-size:14px;line-height:1.7;">このデータを削除します。よろしいですか？</p>
      <p style="margin-top:8px;font-size:13px;color:var(--text-muted)" id="deleteDesc"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeDelete()">キャンセル</button>
      <button class="btn btn-primary" style="background:#c0392b;border-color:#c0392b" onclick="confirmDelete()">削除する</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──
let currentYear, currentMonth; // 1-indexed month
let editingId = null;
let deleteTargetId = null;
let copySelectedIds = new Set();

function getKey(y, m) {
  return `kotsuhi_${y}_${String(m).padStart(2,'0')}`;
}

function loadRecords(y, m) {
  try {
    return JSON.parse(localStorage.getItem(getKey(y, m)) || '[]');
  } catch { return []; }
}

function saveRecords(y, m, records) {
  localStorage.setItem(getKey(y, m), JSON.stringify(records));
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

// ── INIT ──
(function init() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth() + 1;
  render();
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
})();

// ── MONTH NAV ──
function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  if (currentMonth < 1) { currentMonth = 12; currentYear--; }
  render();
}

// ── RENDER ──
function render() {
  const monthStr = `${currentYear}年${currentMonth}月`;
  document.getElementById('monthDisplay').textContent = monthStr;

  const records = loadRecords(currentYear, currentMonth);
  records.sort((a, b) => a.date.localeCompare(b.date));

  const total = records.reduce((s, r) => s + r.oneway * 2, 0);
  document.getElementById('totalBadge').textContent = `合計 ¥${total.toLocaleString()}`;

  const tbody = document.getElementById('tableBody');
  if (records.length === 0) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">この月のデータはありません</td></tr>';
    return;
  }

  tbody.innerHTML = records.map(r => `
    <tr>
      <td class="date">${formatDate(r.date)}</td>
      <td>${esc(r.vendor)}</td>
      <td class="route">${esc(r.route)}</td>
      <td class="amount">¥${r.oneway.toLocaleString()}</td>
      <td class="amount total">¥${(r.oneway * 2).toLocaleString()}</td>
      <td class="actions">
        <button class="btn btn-ghost" onclick="openEdit('${r.id}')">編集</button>
        <button class="btn btn-danger-ghost" onclick="openDelete('${r.id}')">削除</button>
      </td>
    </tr>
  `).join('');
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return `${d.getMonth()+1}/${d.getDate()}（${['日','月','火','水','木','金','土'][d.getDay()]}）`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── ADD ──
function openAdd() {
  editingId = null;
  document.getElementById('editModalTitle').textContent = '新規追加';
  const today = new Date();
  // デフォルトは現在表示中の月の1日
  const d = `${currentYear}-${String(currentMonth).padStart(2,'0')}-01`;
  document.getElementById('f_date').value = d;
  document.getElementById('f_vendor').value = '';
  document.getElementById('f_route').value = '';
  document.getElementById('f_oneway').value = '';
  document.getElementById('f_roundtrip').textContent = '0 円';
  document.getElementById('editOverlay').classList.add('open');
  setTimeout(() => document.getElementById('f_date').focus(), 50);
}

// ── EDIT ──
function openEdit(id) {
  const records = loadRecords(currentYear, currentMonth);
  const r = records.find(x => x.id === id);
  if (!r) return;
  editingId = id;
  document.getElementById('editModalTitle').textContent = '編集';
  document.getElementById('f_date').value = r.date;
  document.getElementById('f_vendor').value = r.vendor;
  document.getElementById('f_route').value = r.route;
  document.getElementById('f_oneway').value = r.oneway;
  document.getElementById('f_roundtrip').textContent = (r.oneway * 2).toLocaleString() + ' 円';
  document.getElementById('editOverlay').classList.add('open');
}

function closeEdit() {
  document.getElementById('editOverlay').classList.remove('open');
}

function updateRoundTrip() {
  const v = parseInt(document.getElementById('f_oneway').value) || 0;
  document.getElementById('f_roundtrip').textContent = (v * 2).toLocaleString() + ' 円';
}

function saveEdit() {
  const date = document.getElementById('f_date').value;
  const vendor = document.getElementById('f_vendor').value.trim();
  const route = document.getElementById('f_route').value.trim();
  const oneway = parseInt(document.getElementById('f_oneway').value) || 0;

  if (!date || !vendor || !oneway) {
    alert('勤務日・業者/現場名・片道運賃は必須です。');
    return;
  }

  const records = loadRecords(currentYear, currentMonth);
  if (editingId) {
    const i = records.findIndex(x => x.id === editingId);
    if (i >= 0) records[i] = { ...records[i], date, vendor, route, oneway };
  } else {
    records.push({ id: genId(), date, vendor, route, oneway });
  }
  saveRecords(currentYear, currentMonth, records);
  closeEdit();
  render();
}

// ── DELETE ──
function openDelete(id) {
  deleteTargetId = id;
  const records = loadRecords(currentYear, currentMonth);
  const r = records.find(x => x.id === id);
  if (r) {
    document.getElementById('deleteDesc').textContent =
      `${formatDate(r.date)}　${r.vendor}　片道¥${r.oneway.toLocaleString()}`;
  }
  document.getElementById('deleteOverlay').classList.add('open');
}

function closeDelete() {
  document.getElementById('deleteOverlay').classList.remove('open');
  deleteTargetId = null;
}

function confirmDelete() {
  if (!deleteTargetId) return;
  const records = loadRecords(currentYear, currentMonth).filter(x => x.id !== deleteTargetId);
  saveRecords(currentYear, currentMonth, records);
  closeDelete();
  render();
}

// ── COPY FROM HISTORY ──
function openCopyFromHistory() {
  copySelectedIds.clear();
  // デフォルト：前月
  let y = currentYear, m = currentMonth - 1;
  if (m < 1) { m = 12; y--; }
  document.getElementById('copySourceMonth').value = `${y}-${String(m).padStart(2,'0')}`;
  document.getElementById('copyConfirmBtn').disabled = true;
  loadCopySource();
  document.getElementById('copyOverlay').classList.add('open');
}

function closeCopy() {
  document.getElementById('copyOverlay').classList.remove('open');
}

function loadCopySource() {
  const val = document.getElementById('copySourceMonth').value;
  if (!val) return;
  const [sy, sm] = val.split('-').map(Number);

  // 月違い警告
  const warning = document.getElementById('copyWarning');
  if (sy !== currentYear || sm !== currentMonth) {
    warning.classList.add('show');
  } else {
    warning.classList.remove('show');
  }

  const records = loadRecords(sy, sm);
  records.sort((a, b) => a.date.localeCompare(b.date));

  const list = document.getElementById('copyList');
  if (records.length === 0) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">この月にデータはありません</div>';
    return;
  }

  copySelectedIds.clear();
  list.innerHTML = records.map(r => `
    <label style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;font-size:13px;" onchange="updateCopyBtn()">
      <input type="checkbox" value="${r.id}" data-vendor="${esc(r.vendor)}" data-route="${esc(r.route)}" data-oneway="${r.oneway}">
      <span style="flex:1">
        <span style="color:var(--text-muted);margin-right:8px">${formatDate(r.date)}</span>
        <strong>${esc(r.vendor)}</strong>
        ${r.route ? `<span style="color:var(--text-muted);margin-left:6px">${esc(r.route)}</span>` : ''}
      </span>
      <span style="font-variant-numeric:tabular-nums;color:var(--text-muted)">往復 ¥${(r.oneway*2).toLocaleString()}</span>
    </label>
  `).join('');
}

function updateCopyBtn() {
  const checked = document.querySelectorAll('#copyList input[type=checkbox]:checked');
  document.getElementById('copyConfirmBtn').disabled = checked.length === 0;
}

function confirmCopy() {
  const sourceVal = document.getElementById('copySourceMonth').value;
  const [sy, sm] = sourceVal.split('-').map(Number);
  const sourceRecords = loadRecords(sy, sm);

  const checked = document.querySelectorAll('#copyList input[type=checkbox]:checked');
  const targetRecords = loadRecords(currentYear, currentMonth);

  checked.forEach(cb => {
    const src = sourceRecords.find(r => r.id === cb.value);
    if (!src) return;
    // 日付は現在月の同じ日に変換（末日超えは末日に丸める）
    const srcDay = new Date(src.date + 'T00:00:00').getDate();
    const lastDay = new Date(currentYear, currentMonth, 0).getDate();
    const newDay = Math.min(srcDay, lastDay);
    const newDate = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(newDay).padStart(2,'0')}`;
    targetRecords.push({
      id: genId(),
      date: newDate,
      vendor: src.vendor,
      route: src.route,
      oneway: src.oneway,
    });
  });

  saveRecords(currentYear, currentMonth, targetRecords);
  closeCopy();
  render();
}

// キーボード閉じ
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
