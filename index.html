<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Kotsuhi</title>
<link rel="manifest" href="manifest.json">
<style>
:root {
  --bg:#eeebe6; --surface:#fff; --border:#e0dcd6;
  --text:#1a1a1a; --muted:#888; --accent:#1a1a1a; --fg:#fff;
  --danger:#c0392b; --br:#c0392b; --bo:#1a6fb5;
  --shadow:0 1px 6px rgba(0,0,0,.10);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;max-width:560px;margin:0 auto;}

/* HEADER */
header{background:var(--accent);color:var(--fg);padding:13px 14px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;}
header h1{font-size:15px;font-weight:700;letter-spacing:.06em;}
header p{font-size:10px;opacity:.5;margin-top:1px;}
.btn-xl{background:transparent;border:1px solid rgba(255,255,255,.45);color:#fff;
  padding:7px 13px;border-radius:5px;font-family:inherit;font-size:12px;
  font-weight:500;cursor:pointer;white-space:nowrap;letter-spacing:.04em;}
.btn-xl:active{background:rgba(255,255,255,.15);}

/* MONTH BAR */
.mbar{background:var(--surface);border-bottom:1px solid var(--border);
  padding:9px 14px;display:flex;align-items:center;gap:2px;}
.mnav{width:34px;height:34px;border:none;background:transparent;font-size:20px;
  cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;border-radius:50%;}
.mnav:active{background:var(--bg);}
.mlabel{flex:1;text-align:center;font-size:17px;font-weight:700;letter-spacing:.04em;}
.tbadge{background:var(--accent);color:var(--fg);padding:5px 12px;border-radius:6px;
  font-size:12px;font-weight:600;white-space:nowrap;}

/* CARD LIST */
.clist{padding:12px;display:flex;flex-direction:column;gap:10px;}

/* CARD */
.card{background:var(--surface);border-radius:11px;box-shadow:var(--shadow);overflow:hidden;}
.ctop{display:flex;align-items:flex-start;padding:10px 12px 4px;gap:6px;}
.cdate{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap;padding-top:3px;min-width:58px;}
.cvendor{flex:1;display:flex;flex-direction:column;gap:1px;overflow:hidden;}
.vline{display:block;font-weight:700;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cbtns{display:flex;gap:1px;flex-shrink:0;margin-left:4px;}
.cbtn{width:28px;height:28px;border:none;background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;border-radius:7px;font-size:15px;color:var(--muted);}
.cbtn:active{background:var(--bg);}
.cbtn.del{color:var(--danger);}
.cbody{display:flex;align-items:center;padding:2px 12px 12px;gap:8px;}
.croute{flex:1;display:flex;flex-direction:column;gap:3px;}
.rstop{display:flex;flex-direction:column;}
.rline{font-size:10px;color:var(--muted);letter-spacing:.02em;line-height:1.3;}
.rstn{font-size:20px;font-weight:800;line-height:1.2;letter-spacing:-.01em;}
.rarrow{display:flex;align-items:center;padding:1px 0;color:var(--muted);font-size:11px;gap:6px;}
.rarrow::before{content:'';display:inline-block;width:0;height:0;
  border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:7px solid var(--muted);}
.camt{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:4px;min-width:76px;}
.dbadge{font-size:10px;font-weight:800;padding:2px 7px;border-radius:3px;letter-spacing:.06em;}
.dbadge.r{background:var(--br);color:#fff;}
.dbadge.o{background:var(--bo);color:#fff;}
.aval{font-size:22px;font-weight:900;line-height:1;letter-spacing:-.02em;}
.aunit{font-size:13px;font-weight:400;}
.cnote{border-top:1px solid var(--border);padding:6px 12px 8px;font-size:11px;color:var(--muted);line-height:1.5;}

/* ADD CARD */
.addcard{border:2px dashed var(--border);background:transparent;border-radius:11px;
  height:56px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s;width:100%;}
.addcard:active{background:rgba(255,255,255,.5);}
.addicon{font-size:26px;color:var(--muted);line-height:1;}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.52);
  z-index:100;overflow-y:auto;padding:16px 12px 48px;}
.overlay.open{display:block;}

/* MODAL */
.modal{background:var(--surface);max-width:500px;margin:0 auto;
  border-radius:12px;overflow:hidden;box-shadow:0 8px 48px rgba(0,0,0,.32);}
.mhead{background:var(--accent);color:var(--fg);padding:13px 16px;
  display:flex;align-items:center;justify-content:space-between;
  font-size:15px;font-weight:700;letter-spacing:.05em;}
.mclose{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;
  line-height:1;opacity:.7;padding:0 2px;}
.mclose:active{opacity:1;}
.mbody{padding:14px 16px;}
.mfoot{padding:11px 16px;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;gap:8px;background:var(--bg);}

/* FORM */
.fsec{margin-bottom:14px;}
.ftitle{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--muted);
  margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.frow{margin-bottom:9px;}
.frow label{display:block;font-size:11px;font-weight:600;color:var(--muted);
  margin-bottom:3px;letter-spacing:.04em;}
input[type=text],input[type=date],input[type=number],textarea{
  width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:7px;
  background:var(--bg);font-family:inherit;font-size:15px;color:var(--text);-webkit-appearance:none;}
input:focus,textarea:focus{outline:none;border-color:var(--accent);background:#fff;}
textarea{resize:vertical;min-height:58px;}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:9px;}
.f2.single{grid-template-columns:1fr;}
.tgrp{display:flex;border:1px solid var(--border);border-radius:7px;overflow:hidden;}
.tgl{flex:1;padding:9px 6px;border:none;background:var(--bg);font-family:inherit;
  font-size:14px;cursor:pointer;color:var(--muted);font-weight:600;
  transition:background .12s,color .12s;}
.tgl.on{background:var(--accent);color:var(--fg);}
.tgl+.tgl{border-left:1px solid var(--border);}
.derived{padding:9px 11px;background:var(--bg);border:1px solid var(--border);
  border-radius:7px;font-size:15px;color:var(--muted);}
.swrow{display:flex;align-items:center;justify-content:space-between;padding:6px 0 10px;}
.swlabel{font-size:13px;}
.sw{position:relative;width:44px;height:26px;}
.sw input{display:none;}
.swt{position:absolute;inset:0;background:#ccc;border-radius:13px;cursor:pointer;transition:background .2s;}
.sw input:checked+.swt{background:var(--accent);}
.swt::after{content:'';position:absolute;width:22px;height:22px;border-radius:50%;
  background:#fff;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.25);}
.sw input:checked+.swt::after{transform:translateX(18px);}
.warnbox{background:#fef9e7;border:1px solid #e6b800;border-radius:7px;
  padding:9px 12px;font-size:12px;line-height:1.6;margin-bottom:12px;display:none;}
.warnbox.show{display:block;}
.btn{padding:9px 18px;border-radius:7px;border:1px solid transparent;
  cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;}
.btn-p{background:var(--accent);color:var(--fg);border-color:var(--accent);}
.btn-p:active{opacity:.85;}
.btn-o{background:transparent;color:var(--text);border-color:var(--border);}
.btn-o:active{background:var(--bg);}
.btn-d{background:var(--danger);color:#fff;border-color:var(--danger);}
.cmodal{background:var(--surface);max-width:320px;margin:60px auto;
  border-radius:12px;overflow:hidden;box-shadow:0 8px 48px rgba(0,0,0,.32);}
.cmodal .mhead{background:var(--danger);}
.cmodal .mbody{padding:16px;font-size:14px;line-height:1.7;}
.csub{font-size:12px;color:var(--muted);margin-top:6px;font-weight:600;}
</style>
</head>
<body>

<header>
  <div>
    <h1>月交通費請求書</h1>
    <p>電車・バス 他</p>
  </div>
  <button class="btn-xl" onclick="exportExcel()">Excelで保存</button>
</header>

<div class="mbar">
  <button class="mnav" onclick="chM(-1)">‹</button>
  <div class="mlabel" id="mlabel"></div>
  <button class="mnav" onclick="chM(1)">›</button>
  <div class="tbadge" id="tbadge">合計 ¥0</div>
</div>

<div class="clist" id="clist"></div>

<!-- 入力フォーム -->
<div class="overlay" id="formOv">
  <div class="modal">
    <div class="mhead">
      <span id="ftitle">新規追加</span>
      <button class="mclose" onclick="closeForm()">×</button>
    </div>
    <div class="mbody">
      <div class="warnbox" id="cpWarn">⚠️ 月が異なるデータです。運賃の改正などがないかご注意ください！</div>
      <!-- 基本情報 -->
      <div class="fsec">
        <div class="ftitle">基本情報</div>
        <div class="frow"><label>勤務日</label><input type="date" id="f_date"></div>
        <div class="frow"><label>業者 / 現場名</label>
          <input type="text" id="f_vendor" placeholder="例：株式会社○○　△△現場"></div>
        <div class="frow"><label>交通手段</label>
          <div class="tgrp">
            <button class="tgl on" id="t_train" onclick="setTrans('電車')">🚃 電車</button>
            <button class="tgl"    id="t_bus"   onclick="setTrans('バス')">🚌 バス</button>
          </div>
        </div>
      </div>
      <!-- 経路情報 -->
      <div class="fsec">
        <div class="ftitle">経路情報</div>
        <div class="swrow">
          <span class="swlabel">路線入力を省略する</span>
          <label class="sw"><input type="checkbox" id="omitSw" onchange="toggleOmit(this.checked)"><span class="swt"></span></label>
        </div>
        <div class="f2" id="depRow">
          <div><label>出発駅名</label><input type="text" id="f_depS" placeholder="本郷三丁目" list="dl_s" autocomplete="off"></div>
          <div id="depLW"><label>出発路線</label><input type="text" id="f_depL" placeholder="丸ノ内線" list="dl_l" autocomplete="off"></div>
        </div>
        <div class="f2" id="arrRow">
          <div><label>到着駅名</label><input type="text" id="f_arrS" placeholder="後楽園" list="dl_s" autocomplete="off"></div>
          <div id="arrLW"><label>到着路線</label><input type="text" id="f_arrL" placeholder="丸ノ内線" list="dl_l" autocomplete="off"></div>
        </div>
      </div>
      <!-- 料金情報 -->
      <div class="fsec">
        <div class="ftitle">料金情報</div>
        <div class="frow"><label>片道 / 往復</label>
          <div class="tgrp">
            <button class="tgl"    id="t_one"   onclick="setDir('片道')">片道</button>
            <button class="tgl on" id="t_round" onclick="setDir('往復')">往復</button>
          </div>
        </div>
        <div class="f2">
          <div><label>片道運賃（円）</label><input type="number" id="f_fare" min="0" step="1" placeholder="0" oninput="updTotal()"></div>
          <div><label>請求金額（自動）</label><div class="derived" id="f_total">—</div></div>
        </div>
      </div>
      <!-- 備考 -->
      <div class="fsec">
        <div class="ftitle">備考（任意）</div>
        <div class="frow"><textarea id="f_note" placeholder="経由駅、特記事項など"></textarea></div>
      </div>
    </div>
    <div class="mfoot">
      <button class="btn btn-o" onclick="closeForm()">キャンセル</button>
      <button class="btn btn-p" onclick="saveForm()">保存</button>
    </div>
  </div>
</div>

<!-- 削除確認 -->
<div class="overlay" id="delOv">
  <div class="cmodal">
    <div class="mhead">削除の確認</div>
    <div class="mbody">
      <p>このデータを削除しますか？</p>
      <p class="csub" id="delInfo"></p>
    </div>
    <div class="mfoot">
      <button class="btn btn-o" onclick="closeDel()">キャンセル</button>
      <button class="btn btn-d" onclick="confirmDel()">削除する</button>
    </div>
  </div>
</div>

<datalist id="dl_s"></datalist>
<datalist id="dl_l"></datalist>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ── STORAGE ──
const mem={};
const st={
  get(k){try{return localStorage.getItem(k);}catch{return mem[k]??null;}},
  set(k,v){try{localStorage.setItem(k,v);}catch{mem[k]=v;}},
  keys(){try{return Object.keys(localStorage).filter(k=>k.startsWith('kh_'));}
    catch{return Object.keys(mem).filter(k=>k.startsWith('kh_'));}}
};

// ── SETTINGS ──
let cfg=(()=>{try{return JSON.parse(st.get('kh_cfg')||'{}');}catch{return{};}})();
if(cfg.omit===undefined)cfg.omit=true;
const saveCfg=()=>st.set('kh_cfg',JSON.stringify(cfg));

// ── RECORDS ──
const rk=(y,m)=>`kh_${y}_${String(m).padStart(2,'0')}`;
const loadR=(y,m)=>{try{return JSON.parse(st.get(rk(y,m))||'[]');}catch{return[];}};
const saveR=(y,m,a)=>st.set(rk(y,m),JSON.stringify(a));
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);

// ── STATE ──
let Y,M,editId=null,delId=null,fMode=null;
const WD=['日','月','火','水','木','金','土'];
const fmtD=s=>{const d=new Date(s+'T00:00:00');return`${d.getMonth()+1}/${d.getDate()}（${WD[d.getDay()]}）`;};

// ── VENDOR DISPLAY ──
const vFS=n=>n<=4?'18px':n<=7?'15px':n<=11?'12px':n<=15?'10px':'9px';
const vHtml=v=>v.split(/[\s\u3000]+/).filter(Boolean)
  .map(l=>`<span class="vline" style="font-size:${vFS(l.length)}">${esc(l)}</span>`).join('');

// ── AUTOCOMPLETE ──
function fillDL(){
  const S=new Set(),L=new Set();
  st.keys().filter(k=>/^kh_\d{4}_\d{2}$/.test(k)).forEach(k=>{
    try{JSON.parse(st.get(k)||'[]').forEach(r=>{
      if(r.depS)S.add(r.depS);if(r.arrS)S.add(r.arrS);
      if(r.depL)L.add(r.depL);if(r.arrL)L.add(r.arrL);
    });}catch{}
  });
  const fill=(id,set)=>{const e=document.getElementById(id);if(e)e.innerHTML=[...set].map(s=>`<option value="${esc(s)}">`).join('');};
  fill('dl_s',S);fill('dl_l',L);
}

// ── RENDER ──
function render(){
  document.getElementById('mlabel').textContent=`${Y}年${M}月`;
  const recs=loadR(Y,M).sort((a,b)=>a.date.localeCompare(b.date));
  const tot=recs.reduce((s,r)=>s+(r.dir==='往復'?r.fare*2:r.fare),0);
  document.getElementById('tbadge').textContent=`合計 ¥${tot.toLocaleString()}`;

  const cards=recs.map(r=>{
    const billed=r.dir==='往復'?r.fare*2:r.fare;
    const bc=r.dir==='往復'?'r':'o';
    const dL=(!cfg.omit&&r.depL)?`<span class="rline">${esc(r.depL)}</span>`:'';
    const aL=(!cfg.omit&&r.arrL)?`<span class="rline">${esc(r.arrL)}</span>`:'';
    const note=r.note?`<div class="cnote">📝 ${esc(r.note)}</div>`:'';
    return`<div class="card">
      <div class="ctop">
        <div class="cdate">${fmtD(r.date)}</div>
        <div class="cvendor">${vHtml(r.vendor||'（未入力）')}</div>
        <div class="cbtns">
          <button class="cbtn" onclick="openEdit('${r.id}')" title="編集">✏️</button>
          <button class="cbtn" onclick="openCopy('${r.id}')" title="コピー">📋</button>
          <button class="cbtn del" onclick="openDel('${r.id}')" title="削除">✕</button>
        </div>
      </div>
      <div class="cbody">
        <div class="croute">
          <div class="rstop">${dL}<span class="rstn">${esc(r.depS||'？')}</span></div>
          <div class="rarrow"></div>
          <div class="rstop">${aL}<span class="rstn">${esc(r.arrS||'？')}</span></div>
        </div>
        <div class="camt">
          <span class="dbadge ${bc}">${r.dir}</span>
          <span class="aval">${billed.toLocaleString()}<span class="aunit">円</span></span>
        </div>
      </div>${note}
    </div>`;
  }).join('');

  document.getElementById('clist').innerHTML=cards+`<button class="addcard" onclick="openAdd()"><span class="addicon">＋</span></button>`;
}

// ── FORM OPEN ──
function defDate(){
  const n=new Date();
  return(n.getFullYear()===Y&&n.getMonth()+1===M)?n.toISOString().slice(0,10):`${Y}-${String(M).padStart(2,'0')}-01`;
}
function openAdd(){
  fMode='add';editId=null;
  document.getElementById('ftitle').textContent='新規追加';
  clearF();document.getElementById('f_date').value=defDate();
  document.getElementById('cpWarn').classList.remove('show');
  openF();
}
function openEdit(id){
  fMode='edit';editId=id;
  document.getElementById('ftitle').textContent='編集';
  const r=loadR(Y,M).find(x=>x.id===id);if(!r)return;
  fillF(r);document.getElementById('cpWarn').classList.remove('show');
  openF();
}
function openCopy(id){
  fMode='copy';editId=null;
  document.getElementById('ftitle').textContent='コピーして追加';
  const r=loadR(Y,M).find(x=>x.id===id);if(!r)return;
  fillF(r);
  document.getElementById('f_date').value=defDate();
  // 元レコードの月と現在表示月が異なれば警告
  const sd=new Date(r.date+'T00:00:00');
  if(sd.getFullYear()!==Y||sd.getMonth()+1!==M)
    document.getElementById('cpWarn').classList.add('show');
  else
    document.getElementById('cpWarn').classList.remove('show');
  openF();
}
function openF(){fillDL();syncOmit();document.getElementById('formOv').classList.add('open');setTimeout(()=>document.getElementById('f_date').focus(),80);}
function closeForm(){document.getElementById('formOv').classList.remove('open');}

// ── FORM FILL/CLEAR ──
function clearF(){
  ['f_date','f_vendor','f_depS','f_depL','f_arrS','f_arrL','f_note'].forEach(id=>document.getElementById(id).value='');
  setTrans('電車');setDir('往復');
  document.getElementById('f_fare').value='';
  document.getElementById('f_total').textContent='—';
}
function fillF(r){
  document.getElementById('f_vendor').value=r.vendor||'';
  document.getElementById('f_depS').value=r.depS||'';
  document.getElementById('f_depL').value=r.depL||'';
  document.getElementById('f_arrS').value=r.arrS||'';
  document.getElementById('f_arrL').value=r.arrL||'';
  document.getElementById('f_note').value=r.note||'';
  document.getElementById('f_fare').value=r.fare||'';
  setTrans(r.transport||'電車');setDir(r.dir||'往復');updTotal();
}

// ── TOGGLES ──
function setTrans(v){
  document.getElementById('t_train').classList.toggle('on',v==='電車');
  document.getElementById('t_bus').classList.toggle('on',v==='バス');
}
function getTrans(){return document.getElementById('t_train').classList.contains('on')?'電車':'バス';}
function setDir(v){
  document.getElementById('t_one').classList.toggle('on',v==='片道');
  document.getElementById('t_round').classList.toggle('on',v==='往復');
  updTotal();
}
function getDir(){return document.getElementById('t_one').classList.contains('on')?'片道':'往復';}
function updTotal(){
  const f=parseInt(document.getElementById('f_fare').value)||0;
  const t=getDir()==='往復'?f*2:f;
  document.getElementById('f_total').textContent=t>0?`${t.toLocaleString()} 円`:'—';
}

// ── OMIT ──
function syncOmit(){
  const o=cfg.omit;
  document.getElementById('omitSw').checked=o;
  document.getElementById('depLW').style.display=o?'none':'';
  document.getElementById('arrLW').style.display=o?'none':'';
  document.getElementById('depRow').className='f2'+(o?' single':'');
  document.getElementById('arrRow').className='f2'+(o?' single':'');
}
function toggleOmit(v){cfg.omit=v;saveCfg();syncOmit();render();}

// ── SAVE ──
function saveForm(){
  const date=document.getElementById('f_date').value;
  const vendor=document.getElementById('f_vendor').value.trim();
  const depS=document.getElementById('f_depS').value.trim();
  const arrS=document.getElementById('f_arrS').value.trim();
  const fare=parseInt(document.getElementById('f_fare').value)||0;
  if(!date||!vendor||!depS||!arrS||!fare){alert('勤務日・業者/現場名・出発駅・到着駅・運賃は必須です。');return;}
  const rec={
    id:fMode==='edit'?editId:uid(),date,vendor,
    transport:getTrans(),
    depS,depL:document.getElementById('f_depL').value.trim(),
    arrS,arrL:document.getElementById('f_arrL').value.trim(),
    dir:getDir(),fare,
    note:document.getElementById('f_note').value.trim(),
  };
  const recs=loadR(Y,M);
  if(fMode==='edit'){const i=recs.findIndex(x=>x.id===editId);if(i>=0)recs[i]=rec;else recs.push(rec);}
  else recs.push(rec);
  saveR(Y,M,recs);closeForm();render();
}

// ── DELETE ──
function openDel(id){
  delId=id;
  const r=loadR(Y,M).find(x=>x.id===id);
  if(r)document.getElementById('delInfo').textContent=`${fmtD(r.date)}　${r.vendor}`;
  document.getElementById('delOv').classList.add('open');
}
function closeDel(){document.getElementById('delOv').classList.remove('open');delId=null;}
function confirmDel(){if(!delId)return;saveR(Y,M,loadR(Y,M).filter(x=>x.id!==delId));closeDel();render();}

// ── MONTH ──
function chM(d){M+=d;if(M>12){M=1;Y++;}if(M<1){M=12;Y--;}render();}

// ── EXCEL ──
function exportExcel(){
  if(typeof XLSX==='undefined'){alert('Excel機能の読み込みに失敗しました。オンライン環境で再試行してください。');return;}
  const recs=loadR(Y,M).sort((a,b)=>a.date.localeCompare(b.date));
  if(!recs.length){alert('この月のデータがありません。');return;}
  const tot=recs.reduce((s,r)=>s+(r.dir==='往復'?r.fare*2:r.fare),0);
  const rows=[
    ['月交通費請求書（電車・バス 他）','','',`合計請求額：¥${tot.toLocaleString()}`,''],
    ['氏名：','','','',''],
    ['勤務日','業者/現場名','経路','片道（円）','往復（円）'],
  ];
  recs.forEach(r=>{
    const dep=cfg.omit?r.depS:(r.depL?`${r.depL} ${r.depS}`:r.depS);
    const arr=cfg.omit?r.arrS:(r.arrL?`${r.arrL} ${r.arrS}`:r.arrS);
    const route=`${dep} → ${arr}`+(r.note?`\n備考：${r.note}`:'');
    rows.push([fmtD(r.date),r.vendor,route,r.fare,r.dir==='往復'?r.fare*2:'']);
  });
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:16},{wch:26},{wch:34},{wch:10},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws,`${M}月`);
  XLSX.writeFile(wb,`交通費_${Y}年${M}月.xlsx`);
}

// ── UTIL ──
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── KEYBOARD ──
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeForm();closeDel();}});

// ── INIT ──
(()=>{
  const n=new Date();Y=n.getFullYear();M=n.getMonth()+1;
  render();
  if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
})();
</script>
